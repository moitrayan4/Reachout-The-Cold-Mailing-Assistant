# Target "dream" companies whose India career sites are watched for internships
# open to the 2028 graduating batch. These are surfaced as PRIORITY opportunities
# during harvest (see src/sources/company_careers.py), bypassing the usual
# stipend/recency filters so a 2028-eligible internship is never silently dropped.
#
# Each entry: a display `name`, a `category`, and optional hints:
#   careers_url : the India careers/listing page or ATS endpoint, if known/stable.
#                 Leave empty to have the watcher resolve it at runtime (web search,
#                 cached to state/company_careers_urls.json).
#   domain      : the official domain, used to bias runtime URL resolution.
#   ats         : known applicant-tracking system (greenhouse|lever|workday|
#                 smartrecruiters|ashby|amazon|successfactors|icims|custom).
#                 When ats + ats_token are set, the watcher pulls jobs straight
#                 from that ATS's public JSON API (fast + reliable, no browser).
#   ats_token   : the ATS identifier — Greenhouse board token, Lever slug,
#                 SmartRecruiters company id, Ashby org, or Workday "tenant:dc:site"
#                 (e.g. "nvidia:wd5:NVIDIAExternalCareerSite"). Amazon needs none.
#                 If omitted, the watcher tries to discover it from the careers URL.
#
# Add/remove via `python -m src companies ...` (writes overrides to
# state/target_companies.json) or edit this file directly.

target_grad_year: 2028          # the batch we MUST surface internships for
india_only: true                # only watch India offices / India-eligible roles

